version: '3.8'

services:
  scm-backend:
    image: eclipse-temurin:17-jre-alpine
    container_name: scm-backend
    restart: unless-stopped
    ports:
      - "8897:8897"
    volumes:
      - ./scm-backend.jar:/app/app.jar:ro
      - ./logs:/app/logs
      - ./uploadPath:/app/uploadPath
    working_dir: /app
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      # JVM 参数，可根据需要调整
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
    command: ["sh", "-c", "java $$JAVA_OPTS -jar /app/app.jar"]
    networks:
      - scm-network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:8897/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

networks:
  scm-network:
    driver: bridge

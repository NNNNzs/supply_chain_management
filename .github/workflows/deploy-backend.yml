name: Deploy Backend

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'ruoyi-ui/**'
      - 'docs/**'
      - '*.md'
      - '.env.example'
      - '.gitignore'
      - 'LICENSE'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Create deployment package
        run: |
          JAR_FILE="ruoyi-admin/target/scm-backend.jar"
          if [ ! -f "$JAR_FILE" ]; then
            echo "JAR file not found at: $JAR_FILE"
            exit 1
          fi
          tar -czf backend-jar.tar.gz -C ruoyi-admin/target scm-backend.jar

      - name: Deploy docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "${{ secrets.BACKEND_DEPLOY_DIR }}/"

      - name: Deploy startup script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ".github/scripts/deploy-backend.sh"
          target: "${{ secrets.BACKEND_DEPLOY_DIR }}/"
          strip_components: 2

      - name: Deploy JAR via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend-jar.tar.gz"
          target: "/tmp/"

      - name: Deploy and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            DEPLOY_DIR="${{ secrets.BACKEND_DEPLOY_DIR }}"
            APP_NAME="scm-backend"
            JAR_FILE="$APP_NAME.jar"

            cd "$DEPLOY_DIR" || exit 1

            # 备份现有 JAR
            if [ -f "$JAR_FILE" ]; then
              echo "Backing up existing JAR..."
              BACKUP_FILE="${JAR_FILE%.jar}_backup_$(date +%Y%m%d_%H%M%S).jar"
              cp "$JAR_FILE" "$BACKUP_FILE"
              echo "Backup created: $BACKUP_FILE"

              # 只保留最近3个备份
              ls -t ${APP_NAME}_backup_*.jar 2>/dev/null | tail -n +4 | xargs -r rm -f
            fi

            # 解压新 JAR
            tar -xzf /tmp/backend-jar.tar.gz -C "$DEPLOY_DIR"
            rm /tmp/backend-jar.tar.gz

            # 检查 .env 文件
            if [ ! -f ".env" ]; then
              echo "WARNING: .env file not found!"
              echo "Please create .env file from .env.example"
            fi

            # 执行部署脚本
            if [ -f "deploy-backend.sh" ]; then
              chmod +x deploy-backend.sh
              ./deploy-backend.sh
            else
              echo "Deployment script not found!"
              exit 1
            fi

            echo "Backend deployed and restarted successfully!"
